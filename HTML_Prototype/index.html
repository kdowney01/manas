<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MANAS — Interactive Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="wrapper">

    <!-- ── iPhone Frame ── -->
    <div class="phone" id="phone">
      <div class="dynamic-island"></div>

      <!-- Status bar -->
      <div class="status-bar">
        <span id="clock">9:41</span>
        <div class="sb-icons">
          <!-- Signal -->
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
            <rect x="0"  y="9" width="3" height="3" rx=".8" fill="#1C1C1E" opacity=".3"/>
            <rect x="5"  y="6" width="3" height="6" rx=".8" fill="#1C1C1E" opacity=".55"/>
            <rect x="10" y="3" width="3" height="9" rx=".8" fill="#1C1C1E" opacity=".8"/>
            <rect x="14" y="0" width="3" height="12" rx=".8" fill="#1C1C1E"/>
          </svg>
          <!-- WiFi -->
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <circle cx="8" cy="11" r="1.5" fill="#1C1C1E"/>
            <path d="M4.8 7.8Q8 5.5 11.2 7.8" stroke="#1C1C1E" stroke-width="1.4" fill="none" stroke-linecap="round"/>
            <path d="M1.8 5Q8 1.2 14.2 5" stroke="#1C1C1E" stroke-width="1.4" fill="none" stroke-linecap="round" opacity=".4"/>
          </svg>
          <!-- Battery -->
          <svg width="26" height="12" viewBox="0 0 26 12" fill="none">
            <rect x=".6" y="1" width="21" height="10" rx="2.5" stroke="#1C1C1E" stroke-width="1.2" opacity=".65"/>
            <rect x="22" y="4" width="3.2" height="4" rx="1" fill="#1C1C1E" opacity=".38"/>
            <rect x="2"  y="2.5" width="16" height="7" rx="1.5" fill="#1C1C1E" opacity=".82"/>
          </svg>
        </div>
      </div>

      <!-- Nav bar (injected per-screen) -->
      <div id="nav-bar" class="nav-bar hidden"></div>

      <!-- Screen content -->
      <div id="screen" class="screen-root"></div>

      <!-- Tab bar -->
      <nav id="tab-bar" class="tab-bar hidden">
        <button class="tab" data-tab="dashboard">
          <svg width="22" height="20" viewBox="0 0 24 22" fill="none">
            <path d="M12 21.5C12 21.5 1 14 1 6.5C1 3.46 3.46 1 6.5 1C8.24 1 9.8 1.82 10.85 3.08L12 4.5L13.15 3.08C14.2 1.82 15.76 1 17.5 1C20.54 1 23 3.46 23 6.5C23 14 12 21.5 12 21.5Z" fill="currentColor"/>
          </svg>
          <span>Today</span>
        </button>
        <button class="tab" data-tab="companion">
          <svg width="22" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="currentColor"/>
          </svg>
          <span>Companion</span>
        </button>
        <button class="tab" data-tab="settings">
          <svg width="22" height="20" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2.2" fill="none"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="2" fill="none"/>
          </svg>
          <span>Settings</span>
        </button>
      </nav>

      <div class="home-bar"></div>
    </div>

    <!-- ── Dev Tools Panel ── -->
    <aside class="dev-panel">
      <div class="dev-header">
        <span>⚙</span> Dev Tools
      </div>

      <div class="dev-section">
        <div class="dev-section-label">Jump to screen</div>
        <button class="dev-btn" onclick="App.dev.goto('welcome')">Welcome</button>
        <button class="dev-btn" onclick="App.dev.goto('health-access')">Health Access</button>
        <button class="dev-btn" onclick="App.dev.goto('digital-signals')">Digital Signals</button>
        <button class="dev-btn" onclick="App.dev.goto('emergency-contacts')">Emergency Contacts</button>
        <button class="dev-btn" onclick="App.dev.goto('notifications')">Notifications</button>
        <button class="dev-btn" onclick="App.dev.goto('calibration')">Calibration</button>
        <button class="dev-btn" onclick="App.dev.goto('dashboard')">Dashboard</button>
        <button class="dev-btn" onclick="App.dev.goto('companion')">Companion</button>
        <button class="dev-btn" onclick="App.dev.goto('settings')">Settings</button>
        <button class="dev-btn dev-danger" onclick="App.dev.goto('crisis')">Crisis View</button>
      </div>

      <div class="dev-section">
        <div class="dev-section-label">Risk level</div>
        <div class="dev-risk-row">
          <button class="dev-risk dev-risk-low"    onclick="App.dev.setRisk('low')">Low</button>
          <button class="dev-risk dev-risk-mod"    onclick="App.dev.setRisk('moderate')">Mod</button>
          <button class="dev-risk dev-risk-high"   onclick="App.dev.setRisk('high')">High</button>
          <button class="dev-risk dev-risk-crisis" onclick="App.dev.setRisk('crisis')">Crisis</button>
        </div>
      </div>

      <div class="dev-section">
        <div class="dev-section-label">Actions</div>
        <button class="dev-btn" onclick="App.dev.refresh()">Refresh biometrics</button>
        <button class="dev-btn dev-warn" onclick="App.dev.resetOnboarding()">Reset onboarding</button>
      </div>

      <div class="dev-section">
        <div class="dev-section-label">State</div>
        <div id="dev-state" class="dev-state-display"></div>
      </div>
    </aside>

  </div>

  <!-- Modal overlay (sheets, crisis) -->
  <div id="modal-overlay" class="modal-overlay hidden"></div>
  <div id="modal-sheet" class="modal-sheet hidden"></div>

  <script src="js/app.js"></script>
</body>
</html>
